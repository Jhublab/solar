<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Press Any Key Screen -->
        <div id="pressAnyKeyScreen" class="screen active">
            <div class="menu-content">
                <h1 class="game-title">TETRIS</h1>
                <div class="press-any-key-text">PRESS ANY KEY TO CONTINUE</div>
                <div class="blinking-cursor">_</div>
            </div>
        </div>

        <!-- Main Menu Screen -->
        <div id="menuScreen" class="screen">
            <div class="menu-content">
                <h1 class="game-title">TETRIS</h1>
                <div class="high-score-display">
                    High Score: <span id="menuHighScore">0</span>
                </div>
                <div class="menu-buttons">
                    <button id="startBtn" class="btn btn-primary">Start Game</button>
                    <button id="resumeBtn" class="btn btn-secondary" style="display: none;">Resume Game</button>
                    <button id="settingsBtn" class="btn btn-secondary">Settings</button>
                </div>
            </div>
        </div>

        <!-- Settings Screen -->
        <div id="settingsScreen" class="screen">
            <div class="menu-content">
                <h2>Settings</h2>
                <div class="settings-group">
                    <label class="setting-item">
                        <input type="checkbox" id="soundToggle" checked>
                        <span>Sound Effects</span>
                    </label>
                    <label class="setting-item">
                        <input type="checkbox" id="musicToggle" checked>
                        <span>Background Music</span>
                    </label>
                    <div class="volume-control">
                        <label for="volumeSlider">Volume</label>
                        <input type="range" id="volumeSlider" min="0" max="100" value="50" class="volume-slider">
                        <span id="volumeValue">50%</span>
                    </div>
                </div>
                <button id="backBtn" class="btn btn-primary">Back</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="gameScreen" class="screen">
            <div class="game-container">
                <!-- Left sidebar -->
                <div class="sidebar left-sidebar">
                    <div class="info-box">
                        <div class="info-label">Score</div>
                        <div id="scoreDisplay" class="info-value">0</div>
                    </div>
                    <div class="info-box">
                        <div class="info-label">Level</div>
                        <div id="levelDisplay" class="info-value">1</div>
                    </div>
                    <div class="info-box">
                        <div class="info-label">Lines</div>
                        <div id="linesDisplay" class="info-value">0</div>
                    </div>
                </div>

                <!-- Canvas container -->
                <div class="canvas-wrapper">
                    <canvas id="gameCanvas" width="300" height="600"></canvas>
                    <div id="pauseOverlay" class="pause-overlay" style="display: none;">
                        <div class="pause-text">PAUSED</div>
                    </div>
                </div>

                <!-- Right sidebar -->
                <div class="sidebar right-sidebar">
                    <div class="preview-box">
                        <div class="preview-label">Next</div>
                        <canvas id="nextCanvas" width="120" height="120" class="preview-canvas"></canvas>
                    </div>
                    <div class="preview-box">
                        <div class="preview-label">Hold</div>
                        <canvas id="holdCanvas" width="120" height="120" class="preview-canvas"></canvas>
                    </div>
                    <div class="controls-box">
                        <div class="control-label">Controls</div>
                        <div class="control-item">← → Move</div>
                        <div class="control-item">↑ Rotate</div>
                        <div class="control-item">Space Drop</div>
                        <div class="control-item">Shift Hold</div>
                        <div class="control-item">ESC Pause</div>
                    </div>
                </div>

                <!-- Combo Display -->
                <div class="combo-display" id="comboDisplay" style="display: none;">
                    <div class="combo-text">COMBO</div>
                    <div class="combo-count" id="comboCount">2</div>
                </div>
            </div>

            <!-- Touch Controls -->
            <div class="touch-controls" id="touchControls">
                <button class="touch-btn touch-left" id="touchLeft">←</button>
                <button class="touch-btn touch-rotate" id="touchRotate">↑</button>
                <button class="touch-btn touch-right" id="touchRight">→</button>
                <button class="touch-btn touch-drop" id="touchDrop">DROP</button>
                <button class="touch-btn touch-hold" id="touchHold">HOLD</button>
            </div>
        </div>

            <!-- Pause Menu -->
        <div id="pauseMenu" class="menu-overlay" style="display: none;">
            <div class="menu-content small">
                <h2>Game Paused</h2>
                <div class="menu-buttons">
                    <button id="resumeGameBtn" class="btn btn-primary">Resume</button>
                    <button id="restartBtn" class="btn btn-secondary">Restart</button>
                    <button id="mainMenuBtn" class="btn btn-secondary">Main Menu</button>
                </div>
            </div>
        </div>

        <!-- Floating Score Text Container -->
        <div id="floatingScores" class="floating-scores"></div>

        <!-- Particle Container -->
        <canvas id="particleCanvas" class="particle-canvas"></canvas>

        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="screen">
            <div class="menu-content">
                <h2>Game Over</h2>
                <div class="game-over-stats">
                    <div class="stat">
                        <span class="stat-label">Final Score</span>
                        <span id="finalScore" class="stat-value">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Level</span>
                        <span id="finalLevel" class="stat-value">1</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Lines Cleared</span>
                        <span id="finalLines" class="stat-value">0</span>
                    </div>
                </div>
                <div id="newHighScoreMsg" class="new-high-score" style="display: none;">🎉 New High Score! 🎉</div>
                <div class="menu-buttons">
                    <button id="playAgainBtn" class="btn btn-primary">Play Again</button>
                    <button id="mainMenuBtn2" class="btn btn-secondary">Main Menu</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
